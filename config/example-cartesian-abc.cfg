# This file is an example config file for cartesian style printers that
# add three extra "ABC" direction motors (a 6 axis XYZABC machine).
# The A, B and C axes are full kinematic axes - they are planned,
# accelerated and queued through the trapezoid motion queue just like
# the X, Y and Z axes.  One may copy and edit this file to configure a
# new cartesian ABC machine.

# DO NOT COPY THIS FILE WITHOUT CAREFULLY READING AND UPDATING IT
# FIRST. Incorrectly configured parameters may cause damage.

# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: 0
position_max: 200

[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 0
position_max: 200

[stepper_z]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: ^PD3
position_endstop: 0.5
position_max: 200

# The A axis is the first additional "direction" motor.  It is moved
# with the G-Code "A" axis word (eg, "G1 A90 F3600").
[stepper_a]
step_pin: PC0
dir_pin: PL6
enable_pin: !PC2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD2
position_endstop: 0
position_max: 360

# The B axis is the second additional "direction" motor (G-Code "B").
[stepper_b]
step_pin: PC6
dir_pin: PL2
enable_pin: !PC4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC7
position_endstop: 0
position_max: 360

# The C axis is the third additional "direction" motor (G-Code "C").
[stepper_c]
step_pin: PL5
dir_pin: PL7
enable_pin: !PL4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD1
position_endstop: 0
position_max: 360

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.500
filament_diameter: 3.500
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 210

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
control: watermark
min_temp: 0
max_temp: 110

[mcu]
serial: /dev/ttyACM0

[printer]
kinematics: cartesian_abc
max_velocity: 500
max_accel: 3000
max_z_velocity: 25
max_z_accel: 30
