# This file is an example config file for BZCYXZ kinematics printers.
# The BZCYXZ coordinate system features X, Y, Z (Cartesian axes) with 
# B (rotation pitch around Y) and C (rotation yaw around Z) axes.
# B and C are differential axes with respect to X, Z and Y respectively.
#
# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PE5
position_endstop: 0
position_max: 200

[stepper_y]
step_pin: PF6
dir_pin: !PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 0
position_max: 200

[stepper_z]
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 8
endstop_pin: ^PD3
position_endstop: 0.5
position_max: 200

[stepper_b]
step_pin: PC0
dir_pin: PL6
enable_pin: !PC2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD2
position_endstop: 0
position_max: 360

[stepper_c]
step_pin: PC6
dir_pin: PL2
enable_pin: !PC4
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC7
position_endstop: 0
position_max: 360

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.500
filament_diameter: 3.500
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 210

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
control: watermark
min_temp: 0
max_temp: 130

[fan]
pin: PH6

[mcu]
serial: /dev/ttyACM0
baud: 250000

[printer]
kinematics: deltabzcyxz
max_velocity: 300
max_accel: 3000
max_z_velocity: 25
max_z_accel: 30

toolhead_offset_x: 5    # Offset from center of rotation
toolhead_offset_y: 10 
